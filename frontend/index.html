<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detector IA TFG</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; color: #333; }
        .header { border-bottom: 2px solid #0078D4; padding-bottom: 10px; margin-bottom: 20px; }
        button { background-color: #0078D4; color: white; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #005A9E; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #consola { margin-top: 20px; padding: 15px; background: #f4f4f4; border-left: 4px solid #0078D4; border-radius: 4px; font-size: 13px; display: none; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin: 0; color: #0078D4;">Análisis de Seguridad</h3>
    </div>
    
    <p style="font-size: 14px; margin-bottom: 20px;">Evalúa este correo con los motores de IA, VirusTotal y Spamhaus.</p>
    
    <button id="btn-analizar">Analizar Correo</button>
    
    <div id="consola"></div>

    <script src="app.js"></script>
</body>
</html>
